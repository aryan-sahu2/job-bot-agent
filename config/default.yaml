app:
  name: job-bot
  data_dir: storage

browser:
  headless: false
  timeout: 30000
  viewport:
    width: 1280
    height: 800

greenhouse:
  enabled: false
  board_slugs: []

lever:
  enabled: false
  company_slugs: []

linkedin:
  enabled: false
  keywords: []
  location: null

llm:
  provider: ollama
  model: gemma3:4b
  base_url: http://localhost:11434
  timeout: 60

storage:
  database: storage/app.db

logging:
  level: INFO
  file: storage/app.log
