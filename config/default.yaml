app:
  name: job-bot
  data_dir: storage

browser:
  headless: false
  timeout: 30000
  viewport:
    width: 1280
    height: 800
  user_data_dir: storage/browser_profile
  storage_state: storage/session.json

greenhouse:
  enabled: false
  board_slugs: []

lever:
  enabled: false
  company_slugs: []

linkedin:
  enabled: true
  keywords:
    - full stack engineer
    - software engineer
    - python developer
    - react developer
    - backend engineer
  location: Pune

llm:
  provider: ollama
  model: gemma3:4b
  base_url: http://localhost:11434
  timeout: 60

storage:
  database: storage/app.db

logging:
  level: INFO
  file: storage/app.log
